    <title>JADWAL MAPEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color:rgb(238, 248, 195) ;
        }


        table,
        th,
        td {
            border: 2px solid rgb(12, 4, 4);
            border-collapse: separate;
            text-align: center;
            padding: 8px;
            border-spacing: 5px;
        }




        table {
            width: 80%;
            background-color:rgb(255, 188, 144) ;
        }




        th,
        td {
            background-color:pink ;
        }




        caption {
            font-size: 30px;

            color: ;
        }

</head>


<body>

        <tr>
            <th rowspan="3">DAY</th>
            <th colspan="3">SEMINAR</th>
        </tr>

        </tr>
        <tr>
